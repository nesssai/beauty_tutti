<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEAUTY TUTTI</title>
    <script>
      // GitHub Pages SPA fallback:
      // redirect any unknown route to index.html and keep the path in query param `p`.
      // index.html then restores the URL and react-router takes over.
      (function () {
        var loc = window.location;
        var base = loc.pathname.split('/').slice(0, -1).join('/') + '/';
        var path = loc.pathname.substring(base.length - 1);
        var redirect =
          loc.origin +
          base +
          '?p=' +
          encodeURIComponent(path) +
          (loc.search ? '&' + loc.search.substring(1) : '') +
          (loc.hash ? '&h=' + encodeURIComponent(loc.hash.substring(1)) : '');
        loc.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
